volumes:
  postgres_data:
  frontend_dist:

networks:
  backend:
    driver: bridge

services:
  db:
    image: postgres:17-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  migration:
    build: backend/.
    env_file: .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: interview
      PG_PASSWORD: interview
      PG_DB: interview
    command: uv run python -m alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  backend:
    build: backend/.
    env_file: .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: interview
      PG_PASSWORD: interview
      PG_DB: interview
    depends_on:
      migration:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/output
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
